<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Foto + Saat + Footer</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center; /* yatay ortala */
  align-items: center;     /* dikey ortala */
  position: relative;
}

.container {
  display: flex;
  flex-direction: row;
  align-items: center; /* dikeyde ortala */
  gap: 20px;           /* foto ile saat arası boşluk */
}

/* Logo solda */
img {
  width: 150px;        /* daha küçük logo */
  height: auto;
}

/* Saat, logo ile aynı satırda */
#clock {
  font-size: 100px;      /* masaüstü için uygun boyut */
  color: white;
  text-shadow: 3px 3px 10px black;
  line-height: 1;
}

/* Sağ alt köşedeki yazı */
#footer {
  position: fixed;
  right: 20px;
  bottom: 20px;
  color: white;
  font-size: 16px; /* küçük ama okunaklı */
  font-weight: bold;
  text-shadow: 2px 2px 5px black;
}
</style>
</head>
<body>

<div class="container">
  <!-- Logo solda -->
  <img src="https://i.ibb.co/8LRt5JP8/image.jpg" alt="Logo">
  
  <!-- Saat sağda -->
  <div id="clock"></div>
</div>

<!-- Sağ alt köşe yazısı -->
<div id="footer">ÖTB 9B</div>

<script>
// Saat güncelleme
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById("clock").textContent = h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
